---
# Create this manually — do NOT commit the actual token to git.
# Run: kubectl -n node-healer create secret generic linode-api-token \
#        --from-literal=token=YOUR_LINODE_TOKEN_HERE
#
# Or apply this file after replacing the placeholder:
apiVersion: v1
kind: Secret
metadata:
  name: linode-api-token
  namespace: node-healer
type: Opaque
stringData:
  token: "YOUR_LINODE_TOKEN_HERE"   
