---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-healer
  namespace: node-healer
  labels:
    app: node-healer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-healer
  template:
    metadata:
      labels:
        app: node-healer
    spec:
      serviceAccountName: node-healer

      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30

      containers:
        - name: node-healer
          image: your-registry/lke-node-healer:latest  # ← replace
          imagePullPolicy: Always

          env:
            # Set to "true" to observe without annotating any nodes
            - name: DRY_RUN
              value: "false"

            # Comma-separated node names to never annotate
            - name: EXCLUDE_NODES
              value: ""

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          livenessProbe:
            exec:
              command: ["pgrep", "-f", "node_healer.py"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
