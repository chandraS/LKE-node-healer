---
apiVersion: v1
kind: Namespace
metadata:
  name: node-healer

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-healer
  namespace: node-healer

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-healer
rules:
  # Nodes — watch for health, patch for cordon
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]

  # Pods — list needed by kubectl drain
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

  # Pod eviction — needed by kubectl drain
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]

  # PodDisruptionBudgets — drain respects PDBs
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list"]

  # DaemonSets — read needed by kubectl drain --ignore-daemonsets
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-healer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-healer
subjects:
  - kind: ServiceAccount
    name: node-healer
    namespace: node-healer
