---
apiVersion: v1
kind: Namespace
metadata:
  name: node-healer

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-healer
  namespace: node-healer

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-healer
rules:
  # Nodes — watch for Unschedulable=true, patch to set annotations
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-healer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-healer
subjects:
  - kind: ServiceAccount
    name: node-healer
    namespace: node-healer
